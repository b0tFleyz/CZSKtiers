<!DOCTYPE html>
<html lang="cz">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#23242a">
	<title>CZSK Tierlist – Mace</title>
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://mc-heads.net">
    <link rel="preconnect" href="https://docs.google.com">
	<link rel="stylesheet" href="../style.css">
</head>
<body>
	<header class="main-header">
		<h1 class="main-title">CZSK Tierlist</h1>
		<div class="header-actions">
			<a href="https://discord.gg/rAnR4hfKzw" class="discord-link" target="_blank">
				<img src="../kit_icons/discord.png" alt="Discord" class="discord-icon">
				<span>Discord</span>
			</a>
			<form id="search-form" class="search-box" autocomplete="off">
				<span class="search-icon">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
						<circle cx="11" cy="11" r="8" stroke="#23242a" stroke-width="2"/>
						<line x1="18" y1="18" x2="15.5" y2="15.5" stroke="#23242a" stroke-width="2" stroke-linecap="round"/>
					</svg>
				</span>
				<input id="search-input" type="text" placeholder="Najdi hráče..." />
				<span class="search-shortcut">/</span>
			</form>
		</div>
	</header>
	<nav><ul></ul></nav>
	<div id="tabulky">
		<div class="table-container">
			<div id="mace-tabulka" class="tabulka active"></div>
		</div>
	</div>

	<!-- Player Modal -->
	<div id="player-modal" class="player-modal" style="display:none;">
		<div class="player-modal-content">
			<span class="player-modal-close">&times;</span>
			<img class="player-modal-skin" src="" alt="skin">
			<div class="player-modal-name"></div>
			<div class="player-modal-position">
				<span class="player-modal-rank"></span>
				<span class="player-modal-score"></span>
<span class="player-modal-score-title"></span>
			</div>
			<div class="player-modal-tiers"></div>
<div class="player-modal-days" style="display:none;"></div>
<div class="player-modal-achievements"></div>
			<div class="player-modal-journey-hint">
				<span class="journey-hint-icon">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none">
						<polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
					</svg>
				</span>
				Klikni na kit badge pro Tier Journey
			</div>
		</div>
	</div>

	<section>
		<p id="konec">Officiální stránka <a id="mctiers" href="https://mctiers.com">MCTiers</a></p>
	</section>
	<!-- Tier Journey Modal -->
	<div id="tier-journey-modal" class="tier-journey-modal" style="display:none;">
		<div class="tier-journey-content">
			<span class="tier-journey-close">&times;</span>
			<div class="tier-journey-header">
				<img class="tier-journey-kit-icon" src="" alt="">
				<div class="tier-journey-header-text">
					<div class="tier-journey-title"></div>
					<div class="tier-journey-player"></div>
				</div>
			</div>
			<div class="tier-journey-timeline-wrapper"></div>
			<div class="tier-journey-legend">
				<span class="journey-legend-item"><span class="journey-legend-dot" style="background:#FFCF4A;"></span>HT1</span>
				<span class="journey-legend-item"><span class="journey-legend-dot" style="background:#D5B355;"></span>LT1</span>
				<span class="journey-legend-item"><span class="journey-legend-dot" style="background:#A4B3C7;"></span>HT2</span>
				<span class="journey-legend-item"><span class="journey-legend-dot" style="background:#888D95;"></span>LT2</span>
				<span class="journey-legend-item"><span class="journey-legend-dot" style="background:#8F5931;"></span>HT3</span>
				<span class="journey-legend-item"><span class="journey-legend-dot" style="background:#B56326;"></span>LT3</span>
				<span class="journey-legend-item"><span class="journey-legend-dot" style="background:#655B79;"></span>T4/T5</span>
			</div>
		</div>
	</div>
	<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
	<script src="../js/guild-config.js"></script>
	<script src="../js/guild-nav.js"></script>
	<script src="../js/player-count.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
	<script src="../js/firebase-config.js"></script>
	<script>if(typeof FIREBASE_CONFIG!=='undefined'&&FIREBASE_CONFIG.apiKey&&!FIREBASE_CONFIG.apiKey.startsWith('PASTE'))firebase.initializeApp(FIREBASE_CONFIG);</script>
	<script src="../js/auth.js"></script>
	<script src="../js/tierjourney.js"></script>
	<script src="../js/autocomplete.js"></script>
	<script src="../js/kit-renderer.js"></script>
	<script src="../js/mace.js"></script>
</body>
</html>
