<!DOCTYPE html>
<html lang="cz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#23242a">
    <title>CZSK Tierlist – Přihlášení</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
            background: var(--bg-deep);
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            margin-top: 20px;
        }
        .login-card {
            background: linear-gradient(135deg, var(--bg-surface) 0%, var(--bg-card) 100%);
            border-radius: var(--radius-lg);
            padding: 36px 32px 28px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(var(--accent-rgb), 0.1);
            border: 1px solid rgba(var(--accent-rgb), 0.08);
        }
        .login-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-deep);
            border-radius: var(--radius-pill);
            padding: 4px;
            margin-bottom: 28px;
        }
        .login-tab {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.95em;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .login-tab.active {
            background: var(--accent);
            color: #1a1a1f;
            box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.3);
        }
        .login-tab:not(.active):hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }
        .login-form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .login-form.active {
            display: flex;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        .form-group input {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.15);
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .form-submit {
            margin-top: 8px;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent) 0%, #d4b812 100%);
            color: #1a1a1f;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.25);
        }
        .form-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(var(--accent-rgb), 0.35);
        }
        .form-submit:active {
            transform: translateY(0);
        }
        .form-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .form-message {
            text-align: center;
            font-size: 0.9em;
            padding: 10px;
            border-radius: var(--radius-sm);
            display: none;
        }
        .form-message.error {
            display: block;
            background: rgba(220, 38, 38, 0.15);
            color: #f87171;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
        .form-message.success {
            display: block;
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .login-info {
            margin-top: 20px;
            padding: 16px;
            background: rgba(var(--accent-rgb), 0.06);
            border: 1px solid rgba(var(--accent-rgb), 0.12);
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .login-info strong {
            color: var(--accent);
        }
        .login-info code {
            background: var(--bg-deep);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.95em;
            color: var(--text-primary);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            margin-bottom: 16px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--accent);
        }
        .login-title {
            text-align: center;
            margin: 0 0 4px;
            font-size: 1.5em;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9em;
            margin: 0 0 24px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <a href="overall.html" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Zpět na tierlist
        </a>

        <div class="login-card">
            <h1 class="login-title">CZSK Tierlist</h1>
            <p class="login-subtitle">Přihlaš se přes svůj Discord účet</p>

            <div class="login-tabs">
                <button class="login-tab active" data-tab="login">Přihlášení</button>
                <button class="login-tab" data-tab="register">Registrace</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form" class="login-form active">
                <div id="login-msg" class="form-message"></div>
                <div class="form-group">
                    <label>Nick</label>
                    <input type="text" id="login-nick" placeholder="Tvůj Minecraft nick" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Heslo</label>
                    <input type="password" id="login-password" placeholder="Tvoje heslo" required autocomplete="current-password">
                </div>
                <button type="submit" class="form-submit">Přihlásit se</button>
            </form>

            <!-- REGISTER FORM -->
            <form id="register-form" class="login-form">
                <div id="register-msg" class="form-message"></div>
                <div class="form-group">
                    <label>Ověřovací kód</label>
                    <input type="text" id="register-code" placeholder="Kód z /verify na Discordu" required maxlength="6" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Heslo</label>
                    <input type="password" id="register-password" placeholder="Zvol si heslo (min. 6 znaků)" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Heslo znovu</label>
                    <input type="password" id="register-password2" placeholder="Zopakuj heslo" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="form-submit">Zaregistrovat se</button>
            </form>

            <div class="login-info">
                <strong>Jak se registrovat?</strong><br>
                1. Jdi na náš <a href="https://discord.gg/rAnR4hfKzw" target="_blank" style="color:var(--accent)">Discord server</a><br>
                2. Napiš příkaz <code>/verify</code><br>
                3. Bot ti pošle kód do DMs spolu s tvým MC nickem<br>
                4. Zadej kód + heslo zde
            </div>
        </div>
    </div>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
        // Init Firebase
        if (typeof FIREBASE_CONFIG !== 'undefined' && FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith('PASTE')) {
            firebase.initializeApp(FIREBASE_CONFIG);
        }
    </script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (CZSKAuth.isLoggedIn()) {
            window.location.href = 'overall.html';
        }

        // Get return URL from query params (when redirected from bot tunnel for registration)
        var params = new URLSearchParams(location.search);
        var returnUrl = params.get('return');

        function redirectAfterAuth() {
            var auth = JSON.parse(localStorage.getItem('czsktiers_auth') || '{}');
            if (returnUrl && auth.nick) {
                // Redirect back to GitHub Pages with auth data in hash
                auth.apiUrl = location.origin;
                var hash = '#auth=' + encodeURIComponent(JSON.stringify(auth));
                window.location.href = returnUrl + hash;
            } else {
                window.location.href = 'overall.html';
            }
        }

        // Tab switching
        document.querySelectorAll('.login-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.login-tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.login-form').forEach(function(f) { f.classList.remove('active'); });
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-form').classList.add('active');
            });
        });

        function showMsg(id, text, type) {
            var el = document.getElementById(id);
            el.textContent = text;
            el.className = 'form-message ' + type;
        }

        function clearMsg(id) {
            var el = document.getElementById(id);
            el.className = 'form-message';
            el.textContent = '';
        }

        // Login
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearMsg('login-msg');
            var nick = document.getElementById('login-nick').value.trim();
            var password = document.getElementById('login-password').value;
            if (!nick || !password) return showMsg('login-msg', 'Vyplň všechna pole', 'error');

            var btn = this.querySelector('.form-submit');
            btn.disabled = true;
            btn.textContent = 'Přihlašování...';
            try {
                await CZSKAuth.login(nick, password);
                showMsg('login-msg', 'Přihlášení úspěšné! Přesměrovávám...', 'success');
                setTimeout(redirectAfterAuth, 800);
            } catch (err) {
                showMsg('login-msg', err.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Přihlásit se';
            }
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearMsg('register-msg');
            var code = document.getElementById('register-code').value.trim();
            var password = document.getElementById('register-password').value;
            var password2 = document.getElementById('register-password2').value;

            if (!code || !password || !password2) return showMsg('register-msg', 'Vyplň všechna pole', 'error');
            if (password.length < 6) return showMsg('register-msg', 'Heslo musí mít alespoň 6 znaků', 'error');
            if (password !== password2) return showMsg('register-msg', 'Hesla se neshodují', 'error');

            var btn = this.querySelector('.form-submit');
            btn.disabled = true;
            btn.textContent = 'Registrace...';
            try {
                await CZSKAuth.register(code, password);
                showMsg('register-msg', 'Registrace úspěšná! Přesměrovávám...', 'success');
                setTimeout(redirectAfterAuth, 800);
            } catch (err) {
                showMsg('register-msg', err.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Zaregistrovat se';
            }
        });
    </script>
</body>
</html>
